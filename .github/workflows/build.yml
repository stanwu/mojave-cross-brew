name: Build macOS Mojave Tools

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-24.04
    timeout-minutes: 60

    steps:
      - uses: actions/checkout@v4

      - name: Cache osxcross toolchain
        id: cache-osxcross
        uses: actions/cache@v4
        with:
          path: osxcross/target
          key: osxcross-mojave-10.14-${{ runner.os }}

      - name: Install build dependencies
        run: ./install-env.sh

      - name: Build osxcross toolchain
        if: steps.cache-osxcross.outputs.cache-hit != 'true'
        run: |
          cd osxcross
          UNATTENDED=1 TARGET_DIR=$PWD/target ./build.sh || true
          # Fix libc++ headers
          CLANG_VER=$(clang --version | grep -oP '\d+' | head -1)
          SDK_INCLUDE="$PWD/target/SDK/MacOSX10.14.sdk/usr/include"
          if [ ! -d "$SDK_INCLUDE/c++/v1" ]; then
            mkdir -p "$SDK_INCLUDE/c++/v1"
            cp -a "/usr/lib/llvm-${CLANG_VER}/include/c++/v1/"* "$SDK_INCLUDE/c++/v1/"
          fi

      - name: Verify cross-compiler
        run: |
          export PATH="$PWD/osxcross/target/bin:$PATH"
          echo 'int main(){return 0;}' | x86_64-apple-darwin18-clang -x c - -o /tmp/test
          file /tmp/test | grep -q Mach-O
          echo "osxcross OK"

      - name: Build tools
        run: |
          for tool in tmux tree htop bash nano vim screen rsync socat; do
            echo "::group::Building $tool"
            ./brew.sh install "$tool" || echo "WARNING: $tool build failed"
            echo "::endgroup::"
          done

      - name: Download pre-built tools
        run: |
          ./brew.sh install jq
          ./brew.sh install nvim

      - name: Package release tarball
        run: |
          mkdir -p release/bin
          for pkg in cellar/*/; do
            name=$(basename "$pkg")
            bin=$(find "$pkg" -type f -perm -111 2>/dev/null | head -1)
            [ -n "$bin" ] && cp "$bin" "release/bin/$name"
          done
          if [ -d cellar/nvim ]; then
            cp -a cellar/nvim/*/bin release/nvim-bin 2>/dev/null || true
            cp -a cellar/nvim/*/share release/nvim-share 2>/dev/null || true
          fi
          cp install-tmux-macos-mojave.sh release/
          cp test-tmux.sh release/
          cat > release/README.txt << 'HEREDOC'
          mojave-cross-brew pre-built binaries
          =====================================
          Target: macOS Mojave 10.14 (x86_64)
          Built on: Ubuntu 24.04 via osxcross

          Usage:
            scp bin/<tool> your-mac:/usr/local/bin/
            # or copy all:
            scp bin/* your-mac:/usr/local/bin/

          For tmux, also run install-tmux-macos-mojave.sh on the Mac
          to fix terminfo symlinks.

          If Gatekeeper blocks a binary:
            xattr -cr /usr/local/bin/<tool>
          HEREDOC
          echo "=== Release contents ==="
          ls -lh release/bin/
          # Generate version table
          BREW_RAW="https://raw.githubusercontent.com/Homebrew/homebrew-core/master/Formula"
          TABLE="| Tool | Type | Version |\n|------|------|---------|"
          for tool in tmux tree htop bash nano vim screen rsync socat; do
            url=$(curl -sfL "${BREW_RAW}/${tool:0:1}/${tool}.rb" | grep -m1 'url "' | sed 's/.*url "//;s/".*//')
            filename=$(basename "$url" | sed 's/\.tar.*//;s/\.zip$//')
            ver=$(echo "$filename" | grep -oP '[\d]+\.[\d]+[\.\d]*[a-z]?' | tail -1)
            TABLE="${TABLE}\n| ${tool} | cross-compiled | ${ver:-unknown} |"
          done
          TABLE="${TABLE}\n| jq | pre-built | 1.6 |"
          TABLE="${TABLE}\n| nvim | pre-built | 0.9.0 |"
          echo -e "$TABLE" > /tmp/version-table.md
          echo "VERSION_TABLE<<EOF" >> "$GITHUB_ENV"
          cat /tmp/version-table.md >> "$GITHUB_ENV"
          echo "EOF" >> "$GITHUB_ENV"
          VERSION=${GITHUB_REF_NAME:-dev}
          tar czf "mojave-tools-${VERSION}.tar.gz" -C release .
          echo "RELEASE_FILE=mojave-tools-${VERSION}.tar.gz" >> "$GITHUB_ENV"
          echo "RELEASE_VERSION=${VERSION}" >> "$GITHUB_ENV"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: mojave-tools
          path: ${{ env.RELEASE_FILE }}

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ env.RELEASE_FILE }}
          body: |
            ## Pre-built CLI tools for macOS Mojave (10.14 x86_64)

            Cross-compiled on Ubuntu 24.04 via osxcross.

            ### Included tools
            ${{ env.VERSION_TABLE }}

            ### Install
            ```bash
            tar xzf mojave-tools-${{ env.RELEASE_VERSION }}.tar.gz
            scp bin/* your-mac:/usr/local/bin/
            ```

            For tmux, run `install-tmux-macos-mojave.sh` on the Mac to fix terminfo.
